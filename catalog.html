<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Franchises — Sci-Fi &amp; Fantasy Hub</title>
  <meta name="description" content="Browse all sci-fi and fantasy franchises in the SFF Hub database — films, TV shows, books, games, and collectibles for every major IP.">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ---- Catalog-specific styles --------------------------------- */
    .catalog-hero {
      padding: 130px var(--sp-xl) var(--sp-3xl);
      background: linear-gradient(180deg, #080F1C 0%, var(--bg) 100%);
      text-align: center;
    }
    .catalog-hero__eyebrow {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: var(--sp-md);
    }
    .catalog-hero__title {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 5vw, 3.25rem);
      font-weight: 700;
      margin-bottom: var(--sp-md);
      background: linear-gradient(135deg, var(--text) 40%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .catalog-hero__sub {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 540px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ---- Filter bar --------------------------------------------- */
    .filter-bar {
      padding: var(--sp-xl) 0 var(--sp-lg);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--sp-3xl);
    }
    .filter-bar__inner {
      display: flex;
      align-items: center;
      gap: var(--sp-lg);
      flex-wrap: wrap;
    }
    .filter-bar__label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .filter-chips {
      display: flex;
      gap: var(--sp-sm);
      flex-wrap: wrap;
      flex: 1;
    }
    .filter-chip {
      padding: 0.45rem 1.1rem;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      border: 1px solid var(--border);
      color: var(--text-muted);
      background: transparent;
      cursor: pointer;
      transition: all var(--t);
      white-space: nowrap;
    }
    .filter-chip:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .filter-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .filter-count {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-left: auto;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .filter-count span {
      color: var(--text);
      font-weight: 600;
    }

    /* ---- Sort controls ------------------------------------------ */
    .catalog-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-md);
      margin-bottom: var(--sp-xl);
      flex-wrap: wrap;
    }
    .catalog-controls__left {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
    }
    .sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font-sans);
      font-size: 0.8rem;
      padding: 0.45rem 0.9rem;
      border-radius: var(--r-sm);
      cursor: pointer;
      outline: none;
      transition: border-color var(--t);
    }
    .sort-select:focus { border-color: var(--accent); color: var(--text); }
    .view-toggle {
      display: flex;
      gap: 2px;
    }
    .view-btn {
      padding: 0.45rem 0.65rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.8rem;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: all var(--t);
    }
    .view-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .view-btn:first-child { border-radius: var(--r-sm) 0 0 var(--r-sm); }
    .view-btn:last-child  { border-radius: 0 var(--r-sm) var(--r-sm) 0; }

    /* ---- Franchise grid ----------------------------------------- */
    #franchise-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: var(--sp-xl);
      margin-bottom: var(--sp-4xl);
    }
    #franchise-grid.view-list {
      grid-template-columns: 1fr;
    }

    /* ---- Catalog card ------------------------------------------- */
    .catalog-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: var(--text);
      transition: all var(--t-slow);
      position: relative;
    }
    .catalog-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
      box-shadow: 0 12px 40px rgba(0,0,0,0.55), var(--glow);
    }
    .catalog-card__header {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .catalog-card__emoji {
      font-size: 4rem;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.6));
      transition: transform var(--t-slow);
    }
    .catalog-card:hover .catalog-card__emoji {
      transform: scale(1.12) translateY(-3px);
    }
    .catalog-card__header-shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 60%);
      pointer-events: none;
    }
    .catalog-card__body {
      padding: var(--sp-lg);
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .catalog-card__universe {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: var(--sp-xs);
    }
    .catalog-card__name {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: var(--sp-sm);
      line-height: 1.2;
    }
    .catalog-card__genres {
      display: flex;
      gap: var(--sp-xs);
      flex-wrap: wrap;
      margin-bottom: var(--sp-md);
    }
    .catalog-card__genre {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 100px;
      background: var(--accent-dim);
      color: var(--accent-light);
      border: 1px solid rgba(59,130,246,0.25);
      letter-spacing: 0.04em;
    }
    .catalog-card__desc {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.65;
      margin-bottom: var(--sp-lg);
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .catalog-card__stats {
      display: flex;
      gap: var(--sp-md);
      margin-bottom: var(--sp-lg);
      padding: var(--sp-sm) 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .catalog-card__stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .catalog-card__stat-val {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1;
    }
    .catalog-card__stat-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .catalog-card__cta {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--accent-light);
      transition: gap var(--t);
    }
    .catalog-card:hover .catalog-card__cta { gap: var(--sp-md); }
    .catalog-card__cta-arrow {
      transition: transform var(--t);
    }
    .catalog-card:hover .catalog-card__cta-arrow { transform: translateX(4px); }

    /* ---- List view card variant --------------------------------- */
    #franchise-grid.view-list .catalog-card {
      flex-direction: row;
      align-items: stretch;
    }
    #franchise-grid.view-list .catalog-card__header {
      width: 120px;
      height: auto;
      flex-shrink: 0;
      border-radius: 0;
    }
    #franchise-grid.view-list .catalog-card__emoji { font-size: 2.75rem; }
    #franchise-grid.view-list .catalog-card__body {
      flex-direction: row;
      align-items: center;
      gap: var(--sp-lg);
      flex-wrap: wrap;
      padding: var(--sp-md) var(--sp-lg);
    }
    #franchise-grid.view-list .catalog-card__main {
      flex: 1;
      min-width: 200px;
    }
    #franchise-grid.view-list .catalog-card__desc { display: none; }
    #franchise-grid.view-list .catalog-card__stats {
      border: none;
      padding: 0;
      margin: 0;
      gap: var(--sp-xl);
    }
    #franchise-grid.view-list .catalog-card__cta { margin-left: auto; flex-shrink: 0; }
    #franchise-grid.view-list .catalog-card__universe { margin-bottom: 2px; }

    /* ---- Empty state -------------------------------------------- */
    .catalog-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: var(--sp-4xl) var(--sp-xl);
      color: var(--text-muted);
    }
    .catalog-empty h3 { margin-bottom: var(--sp-md); font-size: 1.25rem; }

    /* ---- Responsive --------------------------------------------- */
    @media (max-width: 768px) {
      #franchise-grid { grid-template-columns: 1fr; }
      .catalog-controls { flex-direction: column; align-items: flex-start; }
      .filter-count { margin-left: 0; }
      .filter-bar__inner { gap: var(--sp-md); }
      #franchise-grid.view-list .catalog-card { flex-direction: column; }
      #franchise-grid.view-list .catalog-card__header { width: 100%; height: 120px; }
      #franchise-grid.view-list .catalog-card__body { flex-direction: column; align-items: flex-start; }
      #franchise-grid.view-list .catalog-card__desc { display: -webkit-box; }
      #franchise-grid.view-list .catalog-card__cta { margin-left: 0; }
    }
    @media (max-width: 480px) {
      #franchise-grid { grid-template-columns: 1fr; }
    }
  </style>
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body data-depth="0">
<div id="nav-placeholder"></div>

<!-- ============================================================
     CATALOG HERO
     ============================================================ -->
<section class="catalog-hero">
  <p class="catalog-hero__eyebrow">Sci-Fi &amp; Fantasy Hub</p>
  <h1 class="catalog-hero__title">Browse All Franchises</h1>
  <p class="catalog-hero__sub">
    Explore every sci-fi and fantasy universe in our database — from films and TV
    to books, games, and collectibles for each IP.
  </p>
</section>

<!-- ============================================================
     MAIN CATALOG SECTION
     ============================================================ -->
<section style="padding: 0 0 var(--sp-4xl);">
  <div class="container">

    <!-- Filter bar -->
    <div class="filter-bar">
      <div class="filter-bar__inner">
        <span class="filter-bar__label">Filter by</span>
        <div class="filter-chips" id="filter-chips">
          <button class="filter-chip active" data-genre="all">All</button>
          <button class="filter-chip" data-genre="Sci-Fi">Sci-Fi</button>
          <button class="filter-chip" data-genre="Fantasy">Fantasy</button>
          <button class="filter-chip" data-genre="Space Opera">Space Opera</button>
          <button class="filter-chip" data-genre="Horror">Horror</button>
          <button class="filter-chip" data-genre="Drama">Drama</button>
          <button class="filter-chip" data-genre="Epic">Epic</button>
          <button class="filter-chip" data-genre="Hard SF">Hard SF</button>
        </div>
        <span class="filter-count" id="filter-count">Showing <span id="count-shown">13</span> of <span id="count-total">13</span> franchises</span>
      </div>
    </div>

    <!-- Sort + view controls -->
    <div class="catalog-controls">
      <div class="catalog-controls__left">
        <span style="font-size:0.78rem; color:var(--text-dim); font-weight:600; letter-spacing:0.08em; text-transform:uppercase;">Sort by</span>
        <select class="sort-select" id="sort-select">
          <option value="name">Name A–Z</option>
          <option value="year">Year (Oldest First)</option>
          <option value="items">Most Collectibles</option>
          <option value="films">Most Films</option>
        </select>
      </div>
      <div class="view-toggle">
        <button class="view-btn active" id="view-grid" title="Grid view">⊞ Grid</button>
        <button class="view-btn" id="view-list" title="List view">☰ List</button>
      </div>
    </div>

    <!-- Franchise grid (populated by JS) -->
    <div id="franchise-grid">
      <!-- Cards rendered by buildCatalog() -->
    </div>

  </div>
</section>

<div id="footer-placeholder"></div>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
<script>
/* ============================================================
   Catalog Page Logic
   ============================================================ */
(function () {
  const grid    = document.getElementById('franchise-grid');
  const chips   = document.querySelectorAll('.filter-chip');
  const countShown = document.getElementById('count-shown');
  const countTotal = document.getElementById('count-total');
  const sortSel = document.getElementById('sort-select');
  const btnGrid = document.getElementById('view-grid');
  const btnList = document.getElementById('view-list');

  let activeGenre = 'all';
  let activeSort  = 'name';

  // Helper: first year a franchise appeared
  function franchiseYear(f) {
    const years = [
      ...(f.films       || []).map(x => x.year),
      ...(f.books       || []).map(x => x.year),
      ...(f.tvShows     || []).map(x => parseInt(x.years)),
      ...(f.videoGames  || []).map(x => x.year),
    ].filter(Boolean);
    if (years.length) return Math.min(...years);
    // Fallback: parse first 4-digit year from stats.years string ("1966–Present")
    if (f.stats && f.stats.years) {
      const m = String(f.stats.years).match(/\d{4}/);
      if (m) return parseInt(m[0]);
    }
    return 9999;
  }

  // Sort franchises
  function sorted(arr) {
    return [...arr].sort((a, b) => {
      if (activeSort === 'name')  return a.name.localeCompare(b.name);
      if (activeSort === 'year')  return franchiseYear(a) - franchiseYear(b);
      if (activeSort === 'items') return (b.stats.items || 0) - (a.stats.items || 0);
      if (activeSort === 'films') return (b.stats.films || 0) - (a.stats.films || 0);
      return 0;
    });
  }

  // Filter franchises by genre
  function filtered(arr) {
    if (activeGenre === 'all') return arr;
    return arr.filter(f => (f.genre || []).includes(activeGenre));
  }

  // Build a single catalog card
  function buildCard(f) {
    const url  = `franchise/${f.slug}.html`;
    const stats = f.stats || {};
    const year  = franchiseYear(f);
    // Prefer stats.years string ("1977–Present") for display; fall back to plain year
    const sinceLabel = stats.years
      ? String(stats.years).split(/[–—-]/)[0].trim()
      : (year < 9999 ? String(year) : '—');

    // Stat items to display
    const statItems = [
      stats.films   > 0 ? { val: stats.films,       label: stats.films  === 1 ? 'Film'    : 'Films'   } : null,
      stats.tvShows > 0 ? { val: stats.tvShows,      label: stats.tvShows === 1 ? 'TV Series' : 'TV Series' } : null,
      stats.items   > 0 ? { val: stats.items + '+',  label: 'Collectibles' } : null,
      { val: sinceLabel, label: 'Since' },
    ].filter(Boolean).slice(0, 4);

    const statsHTML = statItems.map(s =>
      `<div class="catalog-card__stat">
        <div class="catalog-card__stat-val">${s.val}</div>
        <div class="catalog-card__stat-label">${s.label}</div>
      </div>`
    ).join('');

    const genresHTML = (f.genre || []).map(g =>
      `<span class="catalog-card__genre">${g}</span>`
    ).join('');

    // Truncate description to ~120 chars for the card
    const desc = (f.description || '').substring(0, 180) + (f.description && f.description.length > 180 ? '…' : '');

    return `
      <a href="${url}" class="catalog-card" data-genres="${(f.genre||[]).join(',')}">
        <div class="catalog-card__header" style="background: ${f.bgGradient || f.bgGradient2 || 'var(--surface)'};">
          <span class="catalog-card__emoji">${f.emoji}</span>
          <div class="catalog-card__header-shine"></div>
        </div>
        <div class="catalog-card__body">
          <div class="catalog-card__main">
            <div class="catalog-card__universe">${f.universe}</div>
            <div class="catalog-card__name">${f.name}</div>
            <div class="catalog-card__genres">${genresHTML}</div>
            <p class="catalog-card__desc">${desc}</p>
          </div>
          <div class="catalog-card__stats">${statsHTML}</div>
          <div class="catalog-card__cta">
            <span>Explore ${f.shortName || f.name}</span>
            <span class="catalog-card__cta-arrow">→</span>
          </div>
        </div>
      </a>`;
  }

  // Render grid
  function render() {
    const data = sorted(filtered(FRANCHISES));
    countShown.textContent = data.length;
    countTotal.textContent = FRANCHISES.length;

    if (data.length === 0) {
      grid.innerHTML = `
        <div class="catalog-empty">
          <h3>No franchises match this filter</h3>
          <p style="font-size:0.9rem;">Try selecting a different genre, or choose <strong>All</strong> to see everything.</p>
        </div>`;
    } else {
      grid.innerHTML = data.map(buildCard).join('');
    }
  }

  // Filter chip clicks
  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      chips.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeGenre = chip.dataset.genre;
      render();
    });
  });

  // Sort select
  sortSel.addEventListener('change', () => {
    activeSort = sortSel.value;
    render();
  });

  // View toggle
  btnGrid.addEventListener('click', () => {
    grid.classList.remove('view-list');
    btnGrid.classList.add('active');
    btnList.classList.remove('active');
  });
  btnList.addEventListener('click', () => {
    grid.classList.add('view-list');
    btnList.classList.add('active');
    btnGrid.classList.remove('active');
  });

  // Initial render
  render();
})();
</script>
</body>
</html>
